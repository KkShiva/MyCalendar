<title>Cyber Calendar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    height:100%;

    background:#000;

    overflow:hidden;

    font-family:Segoe UI,Arial,sans-serif;

}

/*====================================*/


/*====================================*/

iframe{

    flex:1;

    width:100%;

    border:none;

    background:white;

    /* Optional dark appearance */
    filter:
        invert(96%)
        hue-rotate(180deg)
        brightness(.92)
        contrast(.95);

}

</style>

</head>
