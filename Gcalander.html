<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>cal embed</title>
<style>
  :root{
    --bg:#0c0e0c;
    --fg:#c9d1c9;
    --dim:#5f6b5f;
    --accent:#7ee787;
    --prompt:#7ee787;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100%;
    background:var(--bg);
    color:var(--fg);
    font-family:"SFMono-Regular","Cascadia Code","Fira Code",Consolas,"Liberation Mono",Menlo,monospace;
    font-size:14px;
    line-height:1.5;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 16px 60px;
  }
  .wrap{
    width:100%;
    max-width:900px;
  }
  .line{white-space:pre;}
  .prompt{color:var(--prompt);}
  .prompt .sep{color:var(--dim);}
  .path{color:var(--accent);}

  .panel{
    margin-top:14px;
    margin-bottom:20px;
  }
  label{
    display:block;
    color:var(--dim);
    margin-bottom:6px;
    font-size:12px;
  }
  textarea{
    width:100%;
    min-height:90px;
    resize:vertical;
    background:#131511;
    color:var(--fg);
    border:none;
    outline:none;
    padding:10px 12px;
    font-family:inherit;
    font-size:13px;
    caret-color:var(--accent);
  }
  textarea::placeholder{color:var(--dim);}
  textarea:focus{box-shadow:0 0 0 1px var(--accent) inset;}

  .actions{
    display:flex;
    gap:10px;
    align-items:center;
    margin-top:10px;
  }
  button{
    background:none;
    border:none;
    color:var(--accent);
    font-family:inherit;
    font-size:13px;
    cursor:pointer;
    padding:6px 12px;
    background:#131511;
  }
  button:hover{color:#a6f4b3;}
  button:focus-visible{outline:1px solid var(--accent);}
  button.secondary{color:var(--dim);}
  button.secondary:hover{color:var(--fg);}

  .status{
    color:var(--dim);
    font-size:12px;
    margin-left:2px;
  }
  .status.error{color:#e5989b;}

  .cal-frame-container{
    width:100%;
    aspect-ratio:16/11;
    background:#131511;
    overflow:hidden;
    display:none;
  }
  .cal-frame-container.visible{display:block;}
  .cal-frame-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
    filter:invert(1) hue-rotate(180deg) brightness(0.95) contrast(0.92);
    background:#fff;
  }

  .footer{
    color:var(--dim);
    margin-top:20px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="line prompt">guest<span class="sep">@</span>local<span class="sep">:</span><span class="path">~</span><span class="sep">$</span> cal --embed</div>

  <div class="panel">
    <label for="embedInput">paste google calendar iframe embed code</label>
    <textarea id="embedInput" placeholder='&lt;iframe src="https://calendar.google.com/calendar/embed?src=..." style="border:0" width="800" height="600" frameborder="0"&gt;&lt;/iframe&gt;'></textarea>
    <div class="actions">
      <button id="loadBtn">load</button>
      <button id="clearBtn" class="secondary">clear</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="cal-frame-container" id="frameContainer"></div>

  <div class="line prompt footer">guest<span class="sep">@</span>local<span class="sep">:</span><span class="path">~</span><span class="sep">$</span> <span class="cursor"></span></div>
</div>

<script>
(function(){
  var input = document.getElementById('embedInput');
  var loadBtn = document.getElementById('loadBtn');
  var clearBtn = document.getElementById('clearBtn');
  var status = document.getElementById('status');
  var container = document.getElementById('frameContainer');

  function setStatus(msg, isError){
    status.textContent = msg || '';
    status.className = 'status' + (isError ? ' error' : '');
  }

  function extractSrc(code){
    var match = code.match(/src=["']([^"']+)["']/i);
    return match ? match[1].replace(/&amp;/g, '&') : null;
  }

  function loadEmbed(){
    var code = input.value.trim();
    if(!code){
      setStatus('paste an iframe embed code first', true);
      return;
    }
    var src = extractSrc(code);
    if(!src || src.indexOf('calendar.google.com') === -1){
      setStatus('could not find a valid google calendar src', true);
      return;
    }
    container.innerHTML = '';
    var iframe = document.createElement('iframe');
    iframe.src = src;
    iframe.setAttribute('frameborder', '0');
    iframe.setAttribute('scrolling', 'no');
    container.appendChild(iframe);
    container.classList.add('visible');
    setStatus('loaded');
  }

  function clearEmbed(){
    container.classList.remove('visible');
    container.innerHTML = '';
    input.value = '';
    setStatus('');
  }

  loadBtn.addEventListener('click', loadEmbed);
  clearBtn.addEventListener('click', clearEmbed);
})();
</script>
</body>
</html>
